<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Event Details</title>
   <link rel="stylesheet" href="../style.css">
   <script defer src="./scripts/music_event.js"></script>
   <script defer src="./scripts/header.js"></script>
</head>
<body>
   <div id="app">
   <main id="event-content" class="event-info">
      <a class="back-link" href="/">← Back to Events</a>
      <div class="event-detail">
         <div class="event-detail-header">
            <h2 id="name" class="event-title">Event Name</h2>
            <span id="genre" class="genre-badge">Genre</span>
         </div>
         <div class="event-detail-fields">
            <div class="detail-field">
               <span class="detail-label">Date</span>
               <span id="date">2023-10-15</span>
            </div>
            <div class="detail-field">
               <span class="detail-label">Time</span>
               <span id="time">7:00 PM</span>
            </div>
            <div class="detail-field">
               <span class="detail-label">Location</span>
               <span id="location">The Blue Moon Café</span>
            </div>
            <div class="detail-field">
               <span class="detail-label">Ticket Price</span>
               <span id="price">$15</span>
            </div>
         </div>
      </div>
   </main>
   </div>
</body>
</html>
